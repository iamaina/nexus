name: Auto-tag and create stable branch on merge to master

on:
  push:
    branches:
      - master

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        id: commit
        run: echo "message=$(git log -1 --format=%s)" >> $GITHUB_OUTPUT

      - name: Get current version tag
        id: current
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$latest" >> $GITHUB_OUTPUT
          echo "Current version: $latest"

      - name: Determine next version
        id: next
        run: |
          current="${{ steps.current.outputs.tag }}"
          message="${{ steps.commit.outputs.message }}"
          version=${current#v}
          IFS='.' read -r major minor patch <<< "$version"

          if echo "$message" | grep -qiE "^(breaking|major)(\(.+\))?[!:]"; then
            next="v$((major+1)).0.0"
            bump="major"
          elif echo "$message" | grep -qE "^feat(\(.+\))?[!:]"; then
            next="v${major}.$((minor+1)).0"
            bump="minor"
          elif echo "$message" | grep -qE "^(fix|perf|refactor|docs|chore|test)(\(.+\))?[!:]"; then
            next="v${major}.${minor}.$((patch+1))"
            bump="patch"
          else
            echo "::error::Commit message does not follow the Conventional Commits format."
            echo "::error::Message received: \"$message\""
            echo "::error::Expected format: type(scope): subject"
            echo "::error::Valid types: breaking, feat, fix, perf, refactor, docs, chore, test"
            echo "::error::See the commit conventions guide: https://github.com/iamaina/nexus/blob/master/docs/commit-conventions.md"
            echo ""
            echo "If you have multiple commits, squash them first:"
            echo "  git rebase -i master"
            exit 1
          fi

          echo "tag=$next" >> $GITHUB_OUTPUT
          echo "bump=$bump" >> $GITHUB_OUTPUT
          echo "Next version: $next ($bump bump)"

      - name: Create and push tag
        if: steps.next.outputs.tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next.outputs.tag }}" \
            -m "${{ steps.next.outputs.tag }} — ${{ steps.commit.outputs.message }}"
          git push origin "${{ steps.next.outputs.tag }}"
          echo "✅ Tagged ${{ steps.next.outputs.tag }}"

      # Create the next stable working branch in the same job.
      #
      # Why not a separate workflow triggered by the tag push?
      # GitHub suppresses workflow-to-workflow triggers when the event is caused
      # by GITHUB_TOKEN (security feature to prevent infinite loops). A tag pushed
      # by this workflow would never fire a downstream "on: push: tags:" workflow.
      # Doing it here, in the same job, is the only reliable approach.
      - name: Calculate next stable branch name
        id: branch
        if: steps.next.outputs.tag != ''
        run: |
          tag="${{ steps.next.outputs.tag }}"
          version="${tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          next_minor=$((minor + 1))
          branch_name="stable/v${major}.${next_minor}.0"
          echo "name=$branch_name" >> $GITHUB_OUTPUT
          echo "Next stable branch: $branch_name"

      - name: Create stable branch from master
        if: steps.next.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ steps.branch.outputs.name }}"
          if git ls-remote --exit-code --heads origin "$branch" > /dev/null 2>&1; then
            echo "Branch $branch already exists — skipping"
          else
            git checkout -b "$branch"
            git push origin "$branch"
            echo "✅ Created $branch"
          fi

      - name: Protect stable branch (best-effort — requires GitHub Pro/Team)
        if: steps.next.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ steps.branch.outputs.name }}"
          encoded="${branch//\//%2F}"
          repo="${{ github.repository }}"

          gh api \
            --method PUT \
            "repos/${repo}/branches/${encoded}/protection" \
            --field required_status_checks='{"strict":true,"contexts":["golangci-lint"]}' \
            --field enforce_admins=false \
            --field required_pull_request_reviews='{"required_approving_review_count":0,"dismiss_stale_reviews":false}' \
            --field restrictions=null \
            --field allow_force_pushes=false \
            --field allow_deletions=false \
            && echo "✅ Protected $branch" \
            || echo "⚠️  Branch protection skipped (requires GitHub Pro/Team — set manually in repo settings)"

      - name: Summary
        if: steps.next.outputs.tag != ''
        run: |
          echo "### Release ${{ steps.next.outputs.tag }} complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tagged: \`${{ steps.next.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Next working branch: \`${{ steps.branch.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Switch to it: \`git fetch origin && git checkout ${{ steps.branch.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
