name: Create stable branch on tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-stable-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Parse tag and calculate next stable branch
        id: branch
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          next_minor=$((minor + 1))
          branch_name="stable/v${major}.${next_minor}.0"
          echo "name=$branch_name" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Next stable branch: $branch_name (from tag $tag)"

      - name: Create stable branch from master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ steps.branch.outputs.name }}"
          # Check if branch already exists
          if git ls-remote --exit-code --heads origin "$branch" > /dev/null 2>&1; then
            echo "Branch $branch already exists — skipping creation"
          else
            git checkout -b "$branch"
            git push origin "$branch"
            echo "✅ Created branch $branch"
          fi

      - name: Protect stable branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ steps.branch.outputs.name }}"
          # URL-encode the branch name (replace / with %2F)
          encoded="${branch//\//%2F}"
          repo="${{ github.repository }}"

          gh api \
            --method PUT \
            "repos/${repo}/branches/${encoded}/protection" \
            --field required_status_checks='{"strict":true,"contexts":["golangci-lint"]}' \
            --field enforce_admins=false \
            --field required_pull_request_reviews='{"required_approving_review_count":0,"dismiss_stale_reviews":false}' \
            --field restrictions=null \
            --field allow_force_pushes=false \
            --field allow_deletions=false \
            && echo "✅ Protected branch $branch" \
            || echo "⚠️  Branch protection requires GitHub Pro/Team — set manually in repo settings"

      - name: Protect master branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"

          gh api \
            --method PUT \
            "repos/${repo}/branches/master/protection" \
            --field required_status_checks='{"strict":true,"contexts":["golangci-lint"]}' \
            --field enforce_admins=false \
            --field required_pull_request_reviews='{"required_approving_review_count":0,"dismiss_stale_reviews":false}' \
            --field restrictions=null \
            --field allow_force_pushes=false \
            --field allow_deletions=false \
            && echo "✅ Protected master" \
            || echo "⚠️  Branch protection requires GitHub Pro/Team — set manually in repo settings"

      - name: Summary
        run: |
          echo "### Release ${{ steps.branch.outputs.tag }} complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tagged: \`${{ steps.branch.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Next working branch: \`${{ steps.branch.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Devs should: \`git checkout ${{ steps.branch.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
