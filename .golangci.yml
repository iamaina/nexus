version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - misspell
    - revive
    - gosec
    - unconvert
  settings:
    gosec:
      excludes:
        - G101   # We don't hardcode credentials
    revive:
      rules:
        - name: exported
          disabled: true   # Too noisy for small CLI
  exclusions:
    rules:
      - path: '(.+)_test\.go'
        linters:
          - gosec

formatters:
  enable:
    - gofmt
